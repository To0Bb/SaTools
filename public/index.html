<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساتول - تسجيل الدخول</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: #111; border: 1px solid #00ff41; padding: 30px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0a0a0a; border: 1px solid #00ff41; color: #00ff41; border-radius: 5px; }
        button { background: #00ff41; color: #0a0a0a; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
        button:hover { background: #ff00ff; color: #fff; }
        .error { color: #ff0000; margin-top: 10px; }
        .success { color: #00ff41; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center">⚡ ساتول</h1>
    <h3 style="text-align:center">تسجيل الدخول</h3>
    
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    
    <div id="result" class="error" style="margin-top:15px"></div>
    
    <hr style="border-color:#00ff41; margin:20px 0">
    <button onclick="showRegister()">إنشاء حساب جديد</button>
    
    <div id="registerDiv" style="display:none; margin-top:15px">
        <input type="text" id="regUser" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button onclick="register()">تسجيل</button>
    </div>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const resultDiv = document.getElementById('result');
        
        resultDiv.innerHTML = '⏳ جاري تسجيل الدخول...';
        
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (data.success) {
                resultDiv.style.color = '#00ff41';
                resultDiv.innerHTML = '✅ تم تسجيل الدخول بنجاح! جاري التحويل...';
                localStorage.setItem('satool_token', data.token);
                localStorage.setItem('satool_user', JSON.stringify(data.user));
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
            } else {
                resultDiv.style.color = '#ff0000';
                resultDiv.innerHTML = '❌ ' + (data.error || 'خطأ في تسجيل الدخول');
            }
        } catch(error) {
            resultDiv.style.color = '#ff0000';
            resultDiv.innerHTML = '❌ خطأ في الاتصال بالسيرفر: ' + error.message;
        }
    }
    
    async function register() {
        const username = document.getElementById('regUser').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPass').value;
        const resultDiv = document.getElementById('result');
        
        if (!username || !password) {
            resultDiv.innerHTML = '❌ املأ جميع الحقول';
            return;
        }
        
        resultDiv.innerHTML = '⏳ جاري إنشاء الحساب...';
        
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await response.json();
            
            if (data.success) {
                resultDiv.style.color = '#00ff41';
                resultDiv.innerHTML = '✅ تم إنشاء الحساب! يمكنك تسجيل الدخول الآن';
                document.getElementById('registerDiv').style.display = 'none';
                document.getElementById('regUser').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPass').value = '';
            } else {
                resultDiv.style.color = '#ff0000';
                resultDiv.innerHTML = '❌ ' + (data.error || 'خطأ في التسجيل');
            }
        } catch(error) {
            resultDiv.style.color = '#ff0000';
            resultDiv.innerHTML = '❌ خطأ في الاتصال بالسيرفر';
        }
    }
    
    function showRegister() {
        const div = document.getElementById('registerDiv');
        div.style.display = div.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
